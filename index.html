<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Financiero</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0D2B4E;--navy2:#163D6B;--blue:#1A6FBA;--blue-lt:#E8F2FB;
  --teal:#0F8B6C;--teal-lt:#E0F5EE;
  --amber:#B5710F;--amber-lt:#FBF0DC;
  --red:#A02B2B;--red-lt:#FAEAEA;
  --purple:#4A3BAA;--purple-lt:#EEEDFB;
  --bg:#F2F4F7;--bg0:#ffffff;--bg1:#F7F8FA;--bg2:#ECEEF2;
  --tx0:#111827;--tx1:#4B5563;--tx2:#9CA3AF;
  --bd0:rgba(0,0,0,.07);--bd1:rgba(0,0,0,.13);
  --r:8px;--r2:12px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 12px rgba(0,0,0,.1),0 2px 4px rgba(0,0,0,.06);
}
@media(prefers-color-scheme:dark){
  :root{
    --navy:#0A1929;--navy2:#0F2744;--blue:#3B8FD4;--blue-lt:#0E2A42;
    --teal:#1BAF89;--teal-lt:#062A1F;
    --amber:#D4921A;--amber-lt:#2A1E06;
    --red:#D45050;--red-lt:#2A0F0F;
    --purple:#7B6FD4;--purple-lt:#1A1640;
    --bg:#111827;--bg0:#1E2533;--bg1:#242D3D;--bg2:#161D2B;
    --tx0:#F1F5F9;--tx1:#94A3B8;--tx2:#4B5563;
    --bd0:rgba(255,255,255,.07);--bd1:rgba(255,255,255,.13);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx0);font-size:13px;line-height:1.5}

/* ── App shell ── */
.app{display:grid;grid-template-rows:44px 1fr;height:100vh;overflow:hidden}
.topbar{background:var(--navy);display:flex;align-items:center;gap:10px;padding:0 18px;z-index:100}
.tb-logo{color:#fff;font-size:14px;font-weight:600;letter-spacing:-.01em;white-space:nowrap}
.tb-sep{color:rgba(255,255,255,.2);font-size:16px}
.tb-ctx{color:rgba(255,255,255,.6);font-size:12px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb-space{flex:1}
.tb-note-btn{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.8);width:30px;height:30px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s;font-size:15px;position:relative}
.tb-note-btn:hover{background:rgba(255,255,255,.18)}
.tb-note-badge{position:absolute;top:4px;right:4px;width:7px;height:7px;background:#F5A623;border-radius:50%;border:1.5px solid var(--navy)}
.tb-btn{background:rgba(255,255,255,.1);border:none;color:#fff;padding:5px 12px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:5px;transition:.12s;white-space:nowrap}
.tb-btn:hover{background:rgba(255,255,255,.18)}
.tb-btn.accent{background:var(--blue)}
.tb-btn.green{background:var(--teal)}

.body{display:grid;grid-template-columns:210px 1fr;overflow:hidden}

/* ── Sidebar ── */
.sidebar{background:var(--bg0);border-right:.5px solid var(--bd0);display:flex;flex-direction:column;overflow-y:auto}
.sb-nav{flex:1;padding:8px 0}
.sb-sec{padding:10px 0 4px}
.sb-lbl{font-size:10px;font-weight:600;color:var(--tx2);letter-spacing:.07em;text-transform:uppercase;padding:0 14px 4px}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;color:var(--tx1);border-left:2.5px solid transparent;font-size:12.5px;transition:.1s;user-select:none}
.sb-item:hover{background:var(--bg1);color:var(--tx0)}
.sb-item.active{background:var(--blue-lt);color:var(--blue);border-left-color:var(--blue);font-weight:500}
.sb-dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.5;flex-shrink:0}
.sb-icon{width:15px;height:15px;flex-shrink:0;opacity:.7}
.sb-item.active .sb-icon{opacity:1}
.sb-badge{margin-left:auto;font-size:10.5px;background:var(--bg2);padding:1px 6px;border-radius:8px;color:var(--tx2);font-family:'DM Mono',monospace}
.sb-item.active .sb-badge{background:rgba(26,111,186,.15);color:var(--blue)}
.sb-foot{border-top:.5px solid var(--bd0);padding:8px 0}

/* ── Main content ── */
.main{overflow-y:auto;background:var(--bg);display:flex;flex-direction:column}

/* ── Dashboard ── */
.dash{padding:20px}
.dash-title{font-size:18px;font-weight:600;margin-bottom:4px}
.dash-sub{font-size:12px;color:var(--tx2);margin-bottom:18px}
.dash-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.dkpi{background:var(--bg0);border:.5px solid var(--bd0);border-radius:var(--r2);padding:14px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.dkpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent,var(--blue))}
.dkpi-lbl{font-size:11px;color:var(--tx2);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.dkpi-val{font-size:22px;font-weight:600;line-height:1;margin-bottom:3px}
.dkpi-sub{font-size:11px;color:var(--tx2)}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.dash-grid.three{grid-template-columns:1fr 1fr 1fr}
.dash-grid.full{grid-template-columns:1fr}

/* ── Panels ── */
.panel{background:var(--bg0);border:.5px solid var(--bd0);border-radius:var(--r2);overflow:hidden;box-shadow:var(--shadow);margin-bottom:12px}
.ph{padding:10px 16px;border-bottom:.5px solid var(--bd0);display:flex;align-items:center;gap:8px;background:var(--bg1)}
.ph-title{font-size:13px;font-weight:600;flex:1}
.ph-sub{font-size:11px;color:var(--tx2)}

/* ── Tables ── */
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;padding:8px 14px;color:var(--tx2);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;border-bottom:.5px solid var(--bd0);background:var(--bg1);white-space:nowrap}
td{padding:8px 14px;border-bottom:.5px solid var(--bd0);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg1)}

/* ── Client list ── */
.list-wrap{padding:18px}
.list-top{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.list-h{font-size:16px;font-weight:600;flex:1}
.search-box{padding:7px 11px;border-radius:var(--r);border:.5px solid var(--bd1);background:var(--bg0);color:var(--tx0);font-size:12.5px;font-family:inherit;min-width:200px;flex:1;max-width:280px}
.search-box:focus{outline:none;border-color:var(--blue)}

.ctable{background:var(--bg0);border:.5px solid var(--bd0);border-radius:var(--r2);overflow:hidden;box-shadow:var(--shadow)}
.ct-head{display:grid;grid-template-columns:32px 2.2fr 1fr 1fr 1fr 1fr 60px 30px;padding:0 14px;background:var(--bg1);border-bottom:.5px solid var(--bd0)}
.ct-head span{font-size:10.5px;font-weight:600;color:var(--tx2);padding:8px 0;text-transform:uppercase;letter-spacing:.05em}
.ct-row{display:grid;grid-template-columns:32px 2.2fr 1fr 1fr 1fr 1fr 60px 30px;padding:0 14px;border-bottom:.5px solid var(--bd0);cursor:pointer;align-items:center;min-height:52px;transition:background .08s}
.ct-row:last-child{border-bottom:none}
.ct-row:hover{background:#EEF4FD}
.ct-row.sel{background:var(--blue-lt)}
.cname{font-weight:500;font-size:13px}
.csub{font-size:11px;color:var(--tx2);margin-top:1px;display:flex;align-items:center;gap:4px}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;font-family:'DM Mono',monospace}
.av32{width:32px;height:32px;font-size:11px}
.av48{width:48px;height:48px;font-size:15px}
.av-b{background:#DBEAFE;color:#1E40AF}
.av-t{background:#D1FAE5;color:#065F46}
.av-a{background:#FEF3C7;color:#92400E}
.av-p{background:#EDE9FE;color:#4C1D95}
.av-c{background:#FFE4E6;color:#9F1239}

/* ── Pills ── */
.pill{font-size:11px;padding:2px 8px;border-radius:20px;display:inline-block;white-space:nowrap;font-weight:500}
.pill-conservador{background:#D1FAE5;color:#065F46}
.pill-moderado{background:#FEF3C7;color:#92400E}
.pill-agresivo{background:#FFE4E6;color:#9F1239}
.pill-vip{background:#FEF3C7;color:#92400E;border:.5px solid #F5A623}
.pill-potencial{background:#D1FAE5;color:#065F46;border:.5px solid #6EE7B7}
.pill-revision{background:#FFE4E6;color:#9F1239;border:.5px solid #FCA5A5}
.pill-bday{background:#FDE68A;color:#78350F}
.pos{color:#0F766E;font-weight:600}.neg{color:#B91C1C;font-weight:600}
.muted{color:var(--tx2)}

/* ── Detail view ── */
.dv{display:grid;grid-template-columns:220px 1fr;height:100%;overflow:hidden}
.dvside{background:var(--bg0);border-right:.5px solid var(--bd0);padding:18px 14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.dvmain{display:flex;flex-direction:column;overflow:hidden}
.dvhdr{background:var(--navy);padding:12px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.dvhdr-name{color:#fff;font-size:14px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dvbtn{background:rgba(255,255,255,.12);border:none;color:#fff;padding:5px 11px;border-radius:5px;font-size:11.5px;font-family:inherit;cursor:pointer;transition:.1s}
.dvbtn:hover{background:rgba(255,255,255,.22)}
.dvbtn.green{background:var(--teal)}
.dvtabs{background:var(--bg0);border-bottom:.5px solid var(--bd0);display:flex;padding:0 18px;flex-shrink:0;overflow-x:auto}
.dvtab{padding:10px 14px;font-size:12.5px;cursor:pointer;border-bottom:2px solid transparent;color:var(--tx1);white-space:nowrap;transition:.1s}
.dvtab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.dvtab:hover:not(.active){color:var(--tx0)}
.dvbody{padding:18px;background:var(--bg);flex:1;overflow-y:auto}

/* ── Side fields ── */
.dv-sep{border-top:.5px solid var(--bd0);padding-top:12px}
.dv-slbl{font-size:10px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.dv-field{margin-bottom:8px}
.dv-flbl{font-size:10.5px;color:var(--tx2)}
.dv-fval{font-size:13px;margin-top:1px}

/* ── KPIs ── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:9px;margin-bottom:14px}
.kpi{background:var(--bg0);border:.5px solid var(--bd0);border-radius:var(--r2);padding:12px 14px;box-shadow:var(--shadow)}
.kpi-lbl{font-size:10.5px;color:var(--tx2);margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.kpi-val{font-size:20px;font-weight:600;line-height:1.1}
.kpi-sub{font-size:10.5px;color:var(--tx2);margin-top:2px}
.kpi.a{border-top:3px solid var(--blue)}
.kpi.g{border-top:3px solid var(--teal)}
.kpi.o{border-top:3px solid var(--amber)}
.kpi.r{border-top:3px solid var(--red)}

/* ── Buttons ── */
.btn{padding:6px 14px;border-radius:var(--r);border:.5px solid var(--bd1);background:transparent;color:var(--tx0);font-size:12px;font-family:inherit;cursor:pointer;transition:.1s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--bg1)}
.btn.sm{padding:3px 8px;font-size:11px}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn.primary:hover{background:#1559A0}
.btn.teal{background:var(--teal);border-color:var(--teal);color:#fff}
.btn.teal:hover{background:#0A7259}
.btn.danger{background:var(--red-lt);border-color:#FCA5A5;color:var(--red)}
.btn.ghost{border-color:var(--teal);color:var(--teal)}
.btn.ghost:hover{background:var(--teal-lt)}

/* ── Forms ── */
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:11.5px;color:var(--tx1);margin-bottom:3px;font-weight:500}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:8px 10px;border-radius:var(--r);border:.5px solid var(--bd1);background:var(--bg0);color:var(--tx0);font-size:12.5px;font-family:inherit;transition:.1s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,111,186,.1)}
.form-row textarea{resize:vertical;min-height:64px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* ── Alerts ── */
.alert{border-radius:var(--r);padding:8px 12px;font-size:12px;display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;line-height:1.5}
.alert-warn{background:var(--amber-lt);border:.5px solid #F5A623;color:#78350F}
.alert-danger{background:var(--red-lt);border:.5px solid #FCA5A5;color:var(--red)}
.alert-info{background:var(--blue-lt);border:.5px solid #93C5FD;color:#1E40AF}
.alert-success{background:var(--teal-lt);border:.5px solid #6EE7B7;color:#065F46}

/* ── Comments ── */
.cmt-card{border:.5px solid var(--bd0);border-radius:var(--r);padding:10px 13px;margin-bottom:8px;background:var(--bg0)}
.cmt-meta{display:flex;align-items:center;gap:7px;margin-bottom:6px;flex-wrap:wrap}
.cmt-date{font-size:11px;color:var(--tx2);font-family:'DM Mono',monospace}
.cmt-text{font-size:12.5px;line-height:1.7;color:var(--tx0)}
.tp{font-size:11px;padding:2px 7px;border-radius:4px;font-weight:500}
.tp-reunion{background:#DBEAFE;color:#1E40AF}
.tp-llamada{background:#D1FAE5;color:#065F46}
.tp-nota{background:#EDE9FE;color:#4C1D95}
.tp-alerta{background:#FFE4E6;color:#9F1239}
.op-c{background:#D1FAE5;color:#065F46}
.op-v{background:#FFE4E6;color:#9F1239}

/* ── Progress ── */
.prog{height:5px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;border-radius:3px;transition:width .4s}

/* ── Add section ── */
.add-sec{padding:12px 16px;border-top:.5px solid var(--bd0);background:var(--bg1)}
.add-ta{width:100%;padding:8px 10px;border-radius:var(--r);border:.5px solid var(--bd1);background:var(--bg0);color:var(--tx0);font-size:12.5px;font-family:inherit;resize:vertical;min-height:62px;margin-bottom:8px}
.add-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.sel-sm{padding:7px 9px;border-radius:var(--r);border:.5px solid var(--bd1);background:var(--bg0);color:var(--tx0);font-size:12px;font-family:inherit}

/* ── Modal ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-start;justify-content:center;padding-top:60px;z-index:300;backdrop-filter:blur(2px)}
.modal{background:var(--bg0);border-radius:var(--r2);padding:22px;width:min(560px,96vw);max-height:84vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px;padding-bottom:12px;border-bottom:.5px solid var(--bd0)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:.5px solid var(--bd0)}

/* ── Comitente badge ── */
.com-badge{font-size:11px;background:var(--navy);color:#fff;padding:2px 7px;border-radius:4px;font-family:'DM Mono',monospace;letter-spacing:.03em}

/* ── Birthday strip ── */
.bday-strip{background:#FFFBEB;border:.5px solid #F5A623;border-radius:var(--r2);padding:10px 14px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px}
.bday-chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.bday-chip{background:#fff;border:.5px solid #F5A623;border-radius:var(--r);padding:4px 9px;display:flex;align-items:center;gap:6px;cursor:pointer;transition:.1s}
.bday-chip:hover{background:#FFFBEB}
.bday-chip.today{background:#D1FAE5;border-color:#6EE7B7}

/* ── Import ── */
.import-zone{border:2px dashed var(--bd1);border-radius:var(--r2);padding:28px;text-align:center;cursor:pointer;transition:.15s;margin-bottom:12px}
.import-zone:hover,.import-zone.drag{border-color:var(--blue);background:var(--blue-lt)}
.import-zone.ok{border-color:var(--teal);background:var(--teal-lt)}
.ip-preview{overflow-x:auto;max-height:200px;overflow-y:auto;border:.5px solid var(--bd0);border-radius:var(--r);margin-bottom:10px}
.row-ok td{background:#F0FDF4!important}.row-dup td{background:#FFFBEB!important}.row-err td{background:#FFF1F2!important}

/* ── Chart canvas ── */
.chart-wrap{padding:16px;display:flex;justify-content:center}

/* ── Calendar / Agenda ── */
.agenda-day{margin-bottom:14px}
.agenda-date-lbl{font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.agenda-date-lbl::after{content:'';flex:1;height:.5px;background:var(--bd0)}
.agenda-item{background:var(--bg0);border:.5px solid var(--bd0);border-radius:var(--r);padding:9px 13px;margin-bottom:5px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:.1s;border-left:3px solid var(--blue)}
.agenda-item:hover{background:var(--blue-lt)}
.agenda-item.overdue{border-left-color:var(--red)}
.agenda-item.today{border-left-color:var(--teal)}
.ai-name{font-weight:500;font-size:13px}
.ai-sub{font-size:11.5px;color:var(--tx1);margin-top:1px}
.ai-badge{font-size:11px;padding:2px 7px;border-radius:4px;background:var(--blue-lt);color:var(--blue);font-weight:500;white-space:nowrap;flex-shrink:0}

/* ── Notes panel ── */
.notes-panel{position:fixed;top:44px;right:0;bottom:0;width:320px;background:var(--bg0);border-left:.5px solid var(--bd0);box-shadow:-4px 0 20px rgba(0,0,0,.1);z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .2s}
.notes-panel.open{transform:translateX(0)}
.notes-hdr{padding:14px 16px;border-bottom:.5px solid var(--bd0);display:flex;align-items:center;gap:8px}
.notes-hdr-title{font-weight:600;font-size:14px;flex:1}
.notes-body{flex:1;overflow-y:auto;padding:12px}
.note-item{background:var(--bg1);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;position:relative}
.note-text{font-size:12.5px;line-height:1.6;white-space:pre-wrap}
.note-date{font-size:10.5px;color:var(--tx2);margin-top:4px;font-family:'DM Mono',monospace}
.note-del{position:absolute;top:7px;right:7px;background:none;border:none;color:var(--tx2);cursor:pointer;font-size:13px;padding:2px 5px;border-radius:4px}
.note-del:hover{color:var(--red);background:var(--red-lt)}
.notes-add{padding:12px;border-top:.5px solid var(--bd0)}
.notes-ta{width:100%;padding:8px 10px;border-radius:var(--r);border:.5px solid var(--bd1);background:var(--bg1);color:var(--tx0);font-size:12.5px;font-family:inherit;resize:none;height:76px;margin-bottom:7px}

/* ── Calc ── */
.calc-result{background:var(--blue-lt);border:.5px solid #93C5FD;border-radius:var(--r);padding:12px 16px;margin-top:12px}
.calc-result-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--blue);margin-bottom:6px}
.calc-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px}
.calc-row.big{font-size:16px;font-weight:600;margin-top:6px;padding-top:6px;border-top:.5px solid #93C5FD}

/* ── Benchmark ── */
.bench-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bench-label{font-size:12px;width:100px;flex-shrink:0}
.bench-bar-wrap{flex:1;height:18px;background:var(--bg2);border-radius:4px;overflow:hidden;position:relative}
.bench-bar{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px;font-size:11px;font-weight:600;color:#fff;transition:width .5s}
.bench-val{font-size:12px;font-weight:600;width:55px;text-align:right;font-family:'DM Mono',monospace}

/* ── Honorarios ── */
.hon-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 80px;gap:0}

/* ── Tags custom ── */
.tag-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:500;border:.5px solid currentColor;margin:2px}

/* ── Rendimiento mensual ── */
.rend-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:4px}

.rend-pos{background:#D1FAE5;color:#065F46}
.rend-neg{background:#FFE4E6;color:#9F1239}
.rend-neu{background:var(--bg2);color:var(--tx2)}

/* ── Toast ── */
.toast{position:fixed;bottom:20px;right:20px;background:var(--navy);color:#fff;padding:10px 16px;border-radius:var(--r2);font-size:13px;z-index:999;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;box-shadow:var(--shadow-md);display:flex;align-items:center;gap:8px;max-width:320px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--teal)}
.toast.err{background:var(--red)}

.empty{padding:28px;text-align:center;color:var(--tx2);font-size:12.5px}
.divider{height:.5px;background:var(--bd0);margin:12px 0}

// ════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════
const ini = n => n.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
const fUSD = n => '$'+Number(n).toLocaleString('es-AR',{maximumFractionDigits:0});
const fPct = n => (n>=0?'+':'')+Number(n).toFixed(1)+'%';
const dias = f => Math.round((NOW-new Date(f))/86400000);

function calcM(c){
  let cost=0,cur=0;
  (c.positions||[]).forEach(p=>{cost+=p.precioCompra*p.cantUnidades;cur+=p.precioActual*p.cantUnidades;});
  return{totalCosto:cost,totalActual:cur,rendPct:cost>0?(cur-cost)/cost*100:0};
}

function bdInfo(bday){
  if(!bday)return null;
  const[,mm,dd]=bday.split('-');
  const todMD=`${String(NOW.getMonth()+1).padStart(2,'0')}-${String(NOW.getDate()).padStart(2,'0')}`;
  const bdMD=`${mm}-${dd}`;
  let next=new Date(`${NOW.getFullYear()}-${mm}-${dd}`);
  let diff=Math.round((next-NOW)/86400000);
  if(diff<-1){next=new Date(`${NOW.getFullYear()+1}-${mm}-${dd}`);diff=Math.round((next-NOW)/86400000);}
  return{diff,isToday:todMD===bdMD,mm,dd};
}

function toast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.innerHTML=(type==='ok'?'✓ ':type==='err'?'✕ ':'ℹ ')+msg;
  t.className=`toast ${type} show`;
  setTimeout(()=>t.className='toast',3000);
}

// ════════════════════════════════════════════════════════
// SIDEBAR & COUNTS
// ════════════════════════════════════════════════════════
function updateCounts(){
  const a=S.clients;
  const pend=a.filter(c=>c.nextAction).length;
  document.getElementById('sb-all').textContent=a.length;
  document.getElementById('sb-bday').textContent=a.filter(c=>{const b=bdInfo(c.birthday);return b&&(b.isToday||b.diff<=30);}).length;
  document.getElementById('sb-actions').textContent=pend;
  document.getElementById('sb-agenda-cnt').textContent=pend;
  ['conservador','moderado','agresivo'].forEach(k=>document.getElementById('sb-'+k).textContent=a.filter(c=>c.riesgo===k).length);
  ['vip','potencial','revision'].forEach(k=>document.getElementById('sb-'+k).textContent=a.filter(c=>c.tag===k).length);
  const notesBadge=document.getElementById('notes-badge');
  if(notesBadge) notesBadge.style.display=S.notes.length?'block':'none';
}

function setActive(id){
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById(id);
  if(el)el.classList.add('active');
}

        <div class="dkpi-val">${fUSD(totalAUM)}</div>
        <div class="dkpi-sub">${a.length} clientes activos</div>
      </div>
      <div class="dkpi" style="--accent:${rendGlobal>=0?'var(--teal)':'var(--red)'}">
        <div class="dkpi-lbl">Rendimiento global</div>
        <div class="dkpi-val ${rendGlobal>=0?'pos':'neg'}">${fPct(rendGlobal)}</div>
        <div class="dkpi-sub">vs capital invertido</div>
      </div>
      <div class="dkpi" style="--accent:var(--amber)">
        <div class="dkpi-lbl">Acciones pendientes</div>
        <div class="dkpi-val">${pendientes.length}</div>
        <div class="dkpi-sub">${vencidas.length>0?`<span style="color:var(--red)">${vencidas.length} vencida${vencidas.length>1?'s':''}</span>`:'Al día ✓'}</div>
      </div>
      <div class="dkpi" style="--accent:var(--purple)">
        <div class="dkpi-lbl">Cumpleaños esta semana</div>
        <div class="dkpi-val">${bdays.length}</div>
        <div class="dkpi-sub">${bdays.length>0?bdays.map(c=>c.name.split(' ')[0]).join(', '):'Ninguno'}</div>
      </div>
      <div class="dkpi" style="--accent:var(--teal)">
        <div class="dkpi-lbl">Capital invertido</div>
        <div class="dkpi-val">${fUSD(totalCost)}</div>
        <div class="dkpi-sub">P&L: ${fUSD(totalAUM-totalCost)}</div>
      </div>
    </div>

    ${vencidas.length>0?`<div class="alert alert-danger" style="margin-bottom:14px">⚠ Tenés ${vencidas.length} acción${vencidas.length>1?'es':''} vencida${vencidas.length>1?'s':''}: ${vencidas.map(c=>`<strong>${c.name}</strong>`).join(', ')}. <span style="cursor:pointer;text-decoration:underline" onclick="showPage('agenda')">Ver agenda →</span></div>`:''}

        <table><thead><tr><th>Cliente</th><th>Capital</th><th>Rend.</th></tr></thead><tbody>
        ${topClientes.map(c=>{const m=calcM(c);return`<tr onclick="selectClient('${c.id}')" style="cursor:pointer">

        ${proximas.length?proximas.map(c=>`
          <div class="agenda-item${c.nextAction.date<TODAY?' overdue':c.nextAction.date===TODAY?' today':''}" onclick="selectClient('${c.id}')">

            <div><div class="ai-badge">${c.nextAction.tipo}</div><div style="font-size:10.5px;color:var(--tx2);text-align:right;margin-top:2px;font-family:'DM Mono',monospace">${c.nextAction.date}</div></div>
          </div>`).join('')
        :'<div class="empty">Sin acciones en los próximos 7 días ✓</div>'}
        </div>
      </div>
    </div>

    <div class="dash-grid three">
      <div class="panel">
        <div class="ph"><span class="ph-title">Distribución por perfil</span></div>
        <div style="padding:14px 16px">
          ${[['Conservador',perfiles.conservador,'var(--teal)'],['Moderado',perfiles.moderado,'var(--amber)'],['Agresivo',perfiles.agresivo,'var(--red)']].map(([lbl,n,color])=>{
            const pct=a.length>0?n/a.length*100:0;
            return`<div class="bench-row">
              <span class="bench-label" style="font-size:12px">${lbl}</span>
              <div class="bench-bar-wrap"><div class="bench-bar" style="width:${pct}%;background:${color}">${pct>12?Math.round(pct)+'%':''}</div></div>
              <span class="bench-val" style="color:${color}">${n}</span>
            </div>`;
          }).join('')}
        </div>
      </div>

      <div class="panel">
        <div class="ph"><span class="ph-title">Mejor rendimiento</span></div>
        <div style="padding:10px 14px">
        ${topRend.map((c,i)=>{const m=calcM(c);return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;cursor:pointer" onclick="selectClient('${c.id}')">
          <span style="font-size:12px;font-weight:700;color:var(--tx2);width:16px">#${i+1}</span>
          <div class="avatar av32 ${c.color}">${ini(c.name)}</div>
          <span style="flex:1;font-size:12.5px;font-weight:500">${c.name}</span>
          <span class="${m.rendPct>=0?'pos':'neg'}" style="font-family:'DM Mono',monospace">${fPct(m.rendPct)}</span>
        </div>`;}).join('')}
        </div>
      </div>

      <div class="panel">
        <div class="ph"><span class="ph-title">Clientes por tag</span></div>
        <div style="padding:14px 16px">
          ${[['VIP','vip','var(--amber)'],['Potencial','potencial','var(--teal)'],['En revisión','revision','var(--red)'],['Sin tag','—','var(--tx2)']].map(([lbl,k,color])=>{
            const n=k==='—'?a.filter(c=>!c.tag||c.tag==='ninguno').length:a.filter(c=>c.tag===k).length;
            const pct=a.length>0?n/a.length*100:0;
            return`<div class="bench-row">
              <span class="bench-label" style="font-size:12px">${lbl}</span>
              <div class="bench-bar-wrap"><div class="bench-bar" style="width:${pct}%;background:${color}">${pct>12?Math.round(pct)+'%':''}</div></div>
              <span class="bench-val" style="color:${color}">${n}</span>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════════
// AGENDA
// ════════════════════════════════════════════════════════
function renderAgenda(){
  document.getElementById('nav-ctx').textContent='Agenda';
  const all=S.clients.filter(c=>c.nextAction).sort((a,b)=>a.nextAction.date.localeCompare(b.nextAction.date));
  const vencidas=all.filter(c=>c.nextAction.date<TODAY);
  const hoy=all.filter(c=>c.nextAction.date===TODAY);
  const proximas=all.filter(c=>c.nextAction.date>TODAY);

  function agendaGroup(label,items,cls=''){
    if(!items.length)return'';
    return`<div class="agenda-day">
      <div class="agenda-date-lbl">${label} (${items.length})</div>
      ${items.map(c=>`<div class="agenda-item ${cls}" onclick="selectClient('${c.id}')">
        <div class="avatar av32 ${c.color}">${ini(c.name)}</div>
        <div style="flex:1">
          <div class="ai-name">${c.name}</div>
          <div class="ai-sub">${c.nextAction.nota||''}</div>
        </div>
        <div style="text-align:right">
          <div class="ai-badge">${c.nextAction.tipo}</div>
          <div style="font-size:10.5px;color:var(--tx2);margin-top:3px;font-family:'DM Mono',monospace">${c.nextAction.date}</div>
        </div>
        <button class="btn sm" style="flex-shrink:0" onclick="event.stopPropagation();markDone('${c.id}')">✓ Listo</button>
      </div>`).join('')}
    </div>`;
  }

  // Agrupar próximas por semana
  let prox7=proximas.filter(c=>c.nextAction.date<=new Date(NOW.getTime()+7*86400000).toISOString().split('T')[0]);
  let prox30=proximas.filter(c=>c.nextAction.date>new Date(NOW.getTime()+7*86400000).toISOString().split('T')[0]&&c.nextAction.date<=new Date(NOW.getTime()+30*86400000).toISOString().split('T')[0]);
  let despues=proximas.filter(c=>c.nextAction.date>new Date(NOW.getTime()+30*86400000).toISOString().split('T')[0]);

  // Bdays próximos
  const bdayClients=S.clients.filter(c=>{const b=bdInfo(c.birthday);return b&&(b.isToday||b.diff<=30);}).sort((a,b)=>bdInfo(a.birthday).diff-bdInfo(b.birthday).diff);

  document.getElementById('main').innerHTML=`<div style="padding:20px;max-width:900px">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap">
      <h2 style="font-size:16px;font-weight:600;flex:1">Agenda de acciones</h2>
      <button class="btn primary" onclick="showClientList('all')">+ Nueva acción</button>
    </div>
    ${!all.length?'<div class="panel"><div class="empty">No hay acciones programadas</div></div>':''}
    ${agendaGroup('⚠ Vencidas',vencidas,'overdue')}
    ${agendaGroup('📅 Hoy',hoy,'today')}
    ${agendaGroup('📆 Próximos 7 días',prox7)}
    ${agendaGroup('🗓 Próximos 30 días',prox30)}
    ${agendaGroup('⏳ Más adelante',despues)}
    ${bdayClients.length?`<div class="agenda-day">
      <div class="agenda-date-lbl">🎂 Cumpleaños próximos</div>
      ${bdayClients.map(c=>{const b=bdInfo(c.birthday);return`<div class="agenda-item" style="border-left-color:var(--amber)" onclick="selectClient('${c.id}')">
        <div class="avatar av32 ${c.color}">${ini(c.name)}</div>
        <div style="flex:1"><div class="ai-name">${c.name}</div><div class="ai-sub">Cumpleaños — ${b.dd}/${b.mm}</div></div>
        <div class="ai-badge" style="background:var(--amber-lt);color:var(--amber)">${b.isToday?'¡Hoy!':'en '+b.diff+'d'}</div>
      </div>`;}).join('')}
    </div>`:''}
  </div>`;
}

function markDone(cid){
  S.clients.find(x=>x.id===cid).nextAction=null;
  save(); updateCounts(); renderAgenda(); toast('Acción marcada como completada');
}

function getFiltered(){
  let list=S.clients;
  const f=S.filter;
  if(f==='bday')list=list.filter(c=>{const b=bdInfo(c.birthday);return b&&(b.isToday||b.diff<=30);});
  else if(f==='actions')list=list.filter(c=>c.nextAction);
  else if(['conservador','moderado','agresivo'].includes(f))list=list.filter(c=>c.riesgo===f);
  else if(['vip','potencial','revision'].includes(f))list=list.filter(c=>c.tag===f);
  const q=(S.search||'').toLowerCase();
  if(q)list=list.filter(c=>c.name.toLowerCase().includes(q)||(c.comitente||'').includes(q)||(c.email||'').toLowerCase().includes(q));
  return list;
}

function renderList(){
  const list=getFiltered();
  const bdays=S.clients.filter(c=>{const b=bdInfo(c.birthday);return b&&(b.isToday||b.diff<=30);}).map(c=>({c,b:bdInfo(c.birthday)})).sort((a,x)=>a.b.diff-x.b.diff);

  const bdHtml=bdays.length?`<div class="bday-strip">
    <span style="font-size:20px">🎂</span>

        <span style="font-size:12px;font-weight:500">${c.name.split(' ')[0]}</span>
        <span style="font-size:11px;background:${b.isToday?'#6EE7B7':'#FDE68A'};color:${b.isToday?'#065F46':'#78350F'};padding:1px 5px;border-radius:3px">${b.isToday?'Hoy':'en '+b.diff+'d'}</span>
      </div>`).join('')}
    </div>
  </div>`:'';

  const rows=list.map(c=>{
    const m=calcM(c);
    const b=bdInfo(c.birthday);
    const bdBadge=b&&b.diff<=7?`<span class="pill pill-bday" style="margin-left:4px">${b.isToday?'Hoy':'en '+b.diff+'d'}</span>`:'';
    return`<div class="ct-row${c.id===S.selId?' sel':''}" onclick="selectClient('${c.id}')">
      <div><div class="avatar av32 ${c.color}">${ini(c.name)}</div></div>
      <div>
        <div class="cname">${c.name}${bdBadge}</div>
        <div class="csub">${c.comitente?`<span class="com-badge">${c.comitente}</span>`:''} <span>${c.email||''}</span></div>

      <div><span class="pill pill-${c.riesgo}">${c.riesgo}</span></div>

      <div style="font-weight:500">${m.totalActual>0?fUSD(m.totalActual):'—'}</div>
      <div class="${m.rendPct>=0?'pos':'neg'}">${m.totalActual>0?fPct(m.rendPct):'—'}</div>
      <div class="muted">${(c.positions||[]).length} pos.</div>
      <div>${c.nextAction?`<span title="${c.nextAction.tipo}: ${c.nextAction.nota||''}" style="width:8px;height:8px;background:${c.nextAction.date<TODAY?'var(--red)':'var(--blue)'};border-radius:50%;display:inline-block"></span>`:''}</div>
    </div>`;
  }).join('');

  document.getElementById('main').innerHTML=`<div class="list-wrap">

// ════════════════════════════════════════════════════════
// TAB: CARTERA
// ════════════════════════════════════════════════════════
function tplCartera(c,m){
  const alerts=(c.positions||[]).filter(p=>(p.precioActual-p.precioCompra)/p.precioCompra*100<-15)
    .map(p=>`<div class="alert alert-danger">⚠ <strong>${p.instrumento}</strong> cayó ${((p.precioActual-p.precioCompra)/p.precioCompra*100).toFixed(1)}% desde el precio de compra</div>`).join('');
  const rows=(c.positions||[]).map(p=>{
    const r=(p.precioActual-p.precioCompra)/p.precioCompra*100;
    const val=p.precioActual*p.cantUnidades;
    const pct=m.totalActual>0?(val/m.totalActual*100):0;
    return`<tr>
      <td><strong>${p.instrumento}</strong><br><span style="font-size:10.5px;color:var(--tx2)">${p.tipo}</span></td>
      <td style="font-family:'DM Mono',monospace">${Number(p.cantUnidades).toLocaleString()}</td>
      <td style="font-family:'DM Mono',monospace">${fUSD(p.precioCompra)}</td>
      <td style="font-family:'DM Mono',monospace">${fUSD(p.precioActual)}</td>
      <td style="font-weight:600;font-family:'DM Mono',monospace">${fUSD(val)}</td>
      <td class="${r>=0?'pos':'neg'}" style="font-family:'DM Mono',monospace">${fPct(r)}</td>
      <td style="color:var(--tx2);font-size:11.5px">${dias(p.fechaCompra)}d</td>
      <td><div style="display:flex;align-items:center;gap:5px"><div class="prog" style="width:50px;margin:0"><div class="prog-fill" style="width:${pct}%;background:var(--blue)"></div></div><span style="font-size:11px">${pct.toFixed(0)}%</span></div></td>
      <td><button class="btn sm" onclick="editPosition('${c.id}','${p.id}')">Editar</button></td>
    </tr>`;
  }).join('');
  return`<div class="kpi-row">
    <div class="kpi a"><div class="kpi-lbl">Capital invertido</div><div class="kpi-val">${fUSD(m.totalCosto)}</div></div>
    <div class="kpi g"><div class="kpi-lbl">Capital actual</div><div class="kpi-val">${fUSD(m.totalActual)}</div></div>
    <div class="kpi o"><div class="kpi-lbl">P&L</div><div class="kpi-val">${fUSD(m.totalActual-m.totalCosto)}</div></div>
    <div class="kpi ${m.rendPct>=0?'g':'r'}"><div class="kpi-lbl">Rendimiento total</div><div class="kpi-val ${m.rendPct>=0?'pos':'neg'}">${fPct(m.rendPct)}</div></div>
    <div class="kpi"><div class="kpi-lbl">Posiciones</div><div class="kpi-val">${(c.positions||[]).length}</div><div class="kpi-sub">${(c.operations||[]).length} ops.</div></div>
  </div>
  ${alerts}
  <div class="panel"><div class="ph"><span class="ph-title">Posiciones actuales</span></div>
  <div style="overflow-x:auto"><table><thead><tr><th>Instrumento</th><th>Cantidad</th><th>P. compra</th><th>P. actual</th><th>Valor</th><th>Rend.</th><th>Tenencia</th><th>% cartera</th><th></th></tr></thead>
  <tbody>${rows||'<tr><td colspan="9" class="empty">Sin posiciones cargadas</td></tr>'}</tbody></table></div></div>`;
}

// ════════════════════════════════════════════════════════
// TAB: RENDIMIENTO
// ════════════════════════════════════════════════════════
function tplRendimiento(c,m){
  const rm=c.rendMensual||{};
  const bench=c.benchmark||{name:'S&P 500',val:0};
  const meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const años=Object.keys(rm).sort().reverse();

  // Calc rendimiento acumulado anual
  function rendAnual(year){
    const data=rm[year]||[];
    let acum=1;
    data.forEach(v=>{if(v!==null&&v!==undefined)acum*=(1+v/100);});
    return(acum-1)*100;
  }

  const gridHtml=años.map(y=>{
    const data=rm[y]||[];
    const acum=rendAnual(y);
    return`<div style="margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
        <span style="font-size:13px;font-weight:600;width:40px">${y}</span>
        <span class="${acum>=0?'pos':'neg'}" style="font-family:'DM Mono',monospace">${fPct(acum)} acum.</span>
      </div>
      <div class="rend-grid">${meses.map((mes,i)=>{
        const v=data[i];
        const cls=v===null||v===undefined?'rend-neu':v>=0?'rend-pos':'rend-neg';
        const lbl=v===null||v===undefined?'—':(v>=0?'+':'')+v.toFixed(1)+'%';
        return`<div class="rend-cell ${cls}" title="${mes} ${y}: ${lbl}" style="position:relative">
          <span style="font-size:8.5px;font-weight:600">${lbl}</span>
        </div>`;
      }).join('')}</div>
      <div style="display:flex;gap:2px;margin-top:2px">${meses.map(m=>`<div style="flex:1;font-size:9px;color:var(--tx2);text-align:center">${m}</div>`).join('')}</div>
    </div>`;
  }).join('');

  return`<div class="kpi-row">
    <div class="kpi g"><div class="kpi-lbl">Rendimiento total</div><div class="kpi-val ${m.rendPct>=0?'pos':'neg'}">${fPct(m.rendPct)}</div></div>
    <div class="kpi a"><div class="kpi-lbl">Benchmark</div><div class="kpi-val">${bench.name}</div><div class="kpi-sub">${fPct(bench.val)} est.</div></div>
    <div class="kpi ${m.rendPct>=bench.val?'g':'r'}"><div class="kpi-lbl">Alpha vs benchmark</div><div class="kpi-val ${(m.rendPct-bench.val)>=0?'pos':'neg'}">${fPct(m.rendPct-bench.val)}</div></div>
  </div>

  <div class="panel" style="margin-bottom:12px">
    <div class="ph">
      <span class="ph-title">Comparación vs Benchmark</span>
      <button class="btn sm" onclick="editBenchmark('${c.id}')">Editar benchmark</button>

function tplRebalanceo(c,m){
  const alloc=c.alloc||{target:{rv:60,rf:30,crypto:10},notes:''};
  const pos=c.positions||[];

  // Calcular distribución actual por clase
  const clases={rv:0,rf:0,crypto:0,otro:0};
  pos.forEach(p=>{
    const val=p.precioActual*p.cantUnidades;
    const cl=p.clase||'otro';
    if(clases[cl]!==undefined) clases[cl]+=val; else clases.otro+=val;
  });
  const total=m.totalActual||1;
  const actual={rv:clases.rv/total*100,rf:clases.rf/total*100,crypto:clases.crypto/total*100,otro:clases.otro/total*100};
  const target=alloc.target;

  const labels={rv:'Renta Variable',rf:'Renta Fija',crypto:'Crypto/Alternativos',otro:'Otros'};
  const colors={rv:'var(--blue)',rf:'var(--teal)',crypto:'var(--amber)',otro:'var(--tx2)'};

  const rows=['rv','rf','crypto','otro'].map(k=>{
    const diff=actual[k]-(target[k]||0);
    const diffVal=diff/100*total;
    return`<tr>
      <td><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${colors[k]};margin-right:6px"></span>${labels[k]}</td>
      <td style="font-family:'DM Mono',monospace">${fUSD(clases[k])}</td>
      <td style="font-family:'DM Mono',monospace">${actual[k].toFixed(1)}%</td>
      <td style="font-family:'DM Mono',monospace">${(target[k]||0).toFixed(1)}%</td>
      <td class="${Math.abs(diff)>5?(diff>0?'neg':'pos'):'muted'}" style="font-family:'DM Mono',monospace;font-weight:600">${diff>0?'+':''}${diff.toFixed(1)}%</td>
      <td style="color:var(--tx2);font-size:12px">${Math.abs(diff)>5?(diff>0?`Vender ${fUSD(Math.abs(diffVal))}`:`Comprar ${fUSD(Math.abs(diffVal))}`):'OK ✓'}</td>
    </tr>`;
  }).join('');

  return`<div class="panel">
    <div class="ph"><span class="ph-title">Asignación objetivo vs actual</span><button class="btn sm" onclick="editAlloc('${c.id}')">Editar objetivo</button></div>
    <div style="padding:14px 16px">
      ${['rv','rf','crypto','otro'].map(k=>{
        const tgt=target[k]||0;
        const act=actual[k];
        return`<div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px">
            <span style="font-weight:500">${labels[k]}</span>
            <span><span class="${Math.abs(act-tgt)>5?(act>tgt?'neg':'pos'):'muted'}" style="font-family:'DM Mono',monospace">${act.toFixed(1)}%</span> <span class="muted">/ objetivo ${tgt}%</span></span>
          </div>
          <div style="position:relative;height:12px;background:var(--bg2);border-radius:4px;overflow:hidden">
            <div style="position:absolute;height:100%;width:${tgt}%;border-right:2px dashed ${colors[k]};opacity:.6;z-index:1"></div>
            <div style="height:100%;width:${Math.min(act,100)}%;background:${colors[k]};border-radius:4px;transition:.4s"></div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div style="overflow-x:auto"><table><thead><tr><th>Clase</th><th>Valor actual</th><th>% actual</th><th>% objetivo</th><th>Diferencia</th><th>Acción sugerida</th></tr></thead>
    <tbody>${rows}</tbody></table></div>
  </div>
  ${alloc.notes?`<div class="alert alert-info"><strong>Nota:</strong> ${alloc.notes}</div>`:''}`;
}

function renderCalc(){
  setActive('sv-calc');

  document.getElementById('main').innerHTML=`<div style="padding:20px;max-width:700px">
    <h2 style="font-size:16px;font-weight:600;margin-bottom:4px">Calculadora de posición</h2>
    <p style="font-size:12.5px;color:var(--tx2);margin-bottom:18px">Determiná el tamaño óptimo de una posición en base a tu riesgo por operación.</p>

    <div class="panel" style="margin-bottom:14px">
      <div class="ph"><span class="ph-title">Parámetros de la operación</span></div>
      <div style="padding:16px">
        <div class="fg2">
          <div class="form-row"><label>Capital total disponible (USD)</label><input type="number" id="calc-capital" placeholder="100000" oninput="calcPos()"></div>
          <div class="form-row"><label>Riesgo por operación (%)</label><input type="number" id="calc-riesgo-pct" placeholder="2" step="0.1" oninput="calcPos()"></div>
          <div class="form-row"><label>Precio de entrada (USD)</label><input type="number" id="calc-entrada" placeholder="0" step="any" oninput="calcPos()"></div>
          <div class="form-row"><label>Stop Loss (USD)</label><input type="number" id="calc-stop" placeholder="0" step="any" oninput="calcPos()"></div>
          <div class="form-row"><label>Precio objetivo / Take Profit (USD)</label><input type="number" id="calc-tp" placeholder="0" step="any" oninput="calcPos()"></div>
          <div class="form-row"><label>Comisión por operación (%)</label><input type="number" id="calc-comision" placeholder="0.1" step="0.01" oninput="calcPos()"></div>
        </div>
        <div id="calc-result"></div>
      </div>
    </div>

    <div class="panel">
      <div class="ph"><span class="ph-title">Calculadora de rendimiento</span></div>
      <div style="padding:16px">
        <div class="fg2">
          <div class="form-row"><label>Capital inicial (USD)</label><input type="number" id="cr-capital" placeholder="10000" oninput="calcRend()"></div>
          <div class="form-row"><label>Rendimiento anual esperado (%)</label><input type="number" id="cr-rend" placeholder="15" step="0.1" oninput="calcRend()"></div>
          <div class="form-row"><label>Años</label><input type="number" id="cr-anos" placeholder="10" min="1" max="50" oninput="calcRend()"></div>
          <div class="form-row"><label>Aporte mensual adicional (USD)</label><input type="number" id="cr-aporte" placeholder="0" oninput="calcRend()"></div>
        </div>
        <div id="rend-result"></div>
      </div>

function calcPos(){
  const cap=parseFloat(document.getElementById('calc-capital')?.value)||0;
  const rp=parseFloat(document.getElementById('calc-riesgo-pct')?.value)||0;
  const ent=parseFloat(document.getElementById('calc-entrada')?.value)||0;
  const sl=parseFloat(document.getElementById('calc-stop')?.value)||0;
  const tp=parseFloat(document.getElementById('calc-tp')?.value)||0;
  const com=parseFloat(document.getElementById('calc-comision')?.value)||0;
  const el=document.getElementById('calc-result'); if(!el)return;
  if(!cap||!rp||!ent||!sl){el.innerHTML='';return;}
  const riskUSD=cap*rp/100;
  const slPct=Math.abs((ent-sl)/ent*100);
  const unidades=riskUSD/(ent-sl);
  const invTotal=unidades*ent;
  const pctCartera=invTotal/cap*100;
  const comisionUSD=invTotal*com/100;
  const rratio=tp>0&&sl<ent?Math.abs((tp-ent)/(ent-sl)):null;
  el.innerHTML=`<div class="calc-result">
    <div class="calc-result-title">Resultado</div>
    <div class="calc-row"><span>Riesgo en USD</span><span style="font-family:'DM Mono',monospace;color:var(--red);font-weight:600">${fUSD(riskUSD)}</span></div>
    <div class="calc-row"><span>Stop Loss distance</span><span style="font-family:'DM Mono',monospace">${slPct.toFixed(2)}%</span></div>
    <div class="calc-row"><span>Unidades a comprar</span><span style="font-family:'DM Mono',monospace">${unidades>0?Math.floor(unidades).toLocaleString():'—'}</span></div>
    <div class="calc-row"><span>Inversión total</span><span style="font-family:'DM Mono',monospace">${fUSD(invTotal)}</span></div>
    <div class="calc-row"><span>% de la cartera</span><span style="font-family:'DM Mono',monospace;${pctCartera>20?'color:var(--red)':''}">${pctCartera.toFixed(1)}%${pctCartera>20?' ⚠':''}</span></div>
    ${com>0?`<div class="calc-row"><span>Comisión estimada</span><span style="font-family:'DM Mono',monospace">${fUSD(comisionUSD)}</span></div>`:''}
    ${rratio?`<div class="calc-row big"><span>Ratio R:R</span><span style="color:${rratio>=2?'var(--teal)':rratio>=1?'var(--amber)':'var(--red)'}">${rratio.toFixed(2)}:1 ${rratio>=2?'✓':rratio>=1?'Aceptable':'⚠ Bajo'}</span></div>`:''}
  </div>`;
}

function calcRend(){
  const cap=parseFloat(document.getElementById('cr-capital')?.value)||0;
  const r=parseFloat(document.getElementById('cr-rend')?.value)||0;
  const anos=parseInt(document.getElementById('cr-anos')?.value)||0;
  const ap=parseFloat(document.getElementById('cr-aporte')?.value)||0;
  const el=document.getElementById('rend-result'); if(!el)return;
  if(!cap||!r||!anos){el.innerHTML='';return;}
  const tr=r/100;
  let final=cap*Math.pow(1+tr,anos);
  if(ap>0){
    const trM=tr/12;
    final+=ap*(Math.pow(1+trM,anos*12)-1)/trM;
  }
  const totalAportado=cap+ap*12*anos;
  const ganancia=final-totalAportado;
  el.innerHTML=`<div class="calc-result">
    <div class="calc-result-title">Proyección a ${anos} años</div>
    <div class="calc-row"><span>Capital inicial</span><span style="font-family:'DM Mono',monospace">${fUSD(cap)}</span></div>
    ${ap>0?`<div class="calc-row"><span>Total aportado</span><span style="font-family:'DM Mono',monospace">${fUSD(totalAportado)}</span></div>`:''}
    <div class="calc-row"><span>Ganancia estimada</span><span style="font-family:'DM Mono',monospace;color:var(--teal);font-weight:600">${fUSD(ganancia)}</span></div>
    <div class="calc-row big"><span>Capital final estimado</span><span style="font-family:'DM Mono',monospace">${fUSD(final)}</span></div>
  </div>`;
}

    <div class="import-zone" id="drop-zone" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="handleDrop(event)" onclick="document.getElementById('file-input').click()">

    <div id="import-result"></div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="downloadTemplate()">⬇ Plantilla</button>
      <button class="btn" onclick="closeModal()">Cancelar</button>

    </div>`);

function handleDrop(e){e.preventDefault();document.getElementById('drop-zone').classList.remove('drag');const f=e.dataTransfer.files[0];if(f)processImportFile(f);}
function handleFileInput(input){const f=input.files[0];if(f)processImportFile(f);}
let _importRows=[];
const COL_MAP={name:['nombre','name','cliente','apellido y nombre'],comitente:['comitente','comitente balanz','nro comitente','numero comitente','n° comitente'],email:['email','mail','correo'],phone:['telefono','teléfono','phone','celular'],birthday:['fecha nacimiento','fecha de nacimiento','birthday','nacimiento'],riesgo:['perfil riesgo','perfil de riesgo','riesgo','risk','perfil'],tag:['tag','etiqueta','categoria']};
function findCol(headers,key){const aliases=COL_MAP[key];for(const h of headers){if(aliases.some(a=>h.toLowerCase().trim()===a))return h;}return null;}
function normRiesgo(v){v=(v||'').toLowerCase().trim();if(v.includes('cons'))return'conservador';if(v.includes('mod'))return'moderado';if(v.includes('agr'))return'agresivo';return'moderado';}
function normTag(v){v=(v||'').toLowerCase().trim();if(v==='vip')return'vip';if(v.includes('pot'))return'potencial';if(v.includes('rev'))return'revision';return'ninguno';}

function processImportFile(file){
  const isCSV=file.name.toLowerCase().endsWith('.csv');
  const reader=new FileReader();
  reader.onload=e=>{
    let rows=[];
    if(isCSV){const lines=e.target.result.split('\n').filter(l=>l.trim());const headers=lines[0].split(',').map(h=>h.trim().replace(/"/g,''));for(let i=1;i<lines.length;i++){const vals=lines[i].split(',').map(v=>v.trim().replace(/"/g,''));const obj={};headers.forEach((h,j)=>obj[h]=vals[j]||'');rows.push(obj);}}
    else{const data=new Uint8Array(e.target.result);const wb=XLSX.read(data,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];rows=XLSX.utils.sheet_to_json(ws,{defval:''});}
    parseImportRows(rows);
  };
  if(isCSV)reader.readAsText(file); else reader.readAsArrayBuffer(file);
}

function parseImportRows(rows){
  if(!rows.length){document.getElementById('import-result').innerHTML='<div class="alert alert-danger">El archivo está vacío</div>';return;}
  const headers=Object.keys(rows[0]);
  const cols={name:findCol(headers,'name'),com:findCol(headers,'comitente'),email:findCol(headers,'email'),phone:findCol(headers,'phone'),bday:findCol(headers,'birthday'),riesgo:findCol(headers,'riesgo'),tag:findCol(headers,'tag')};
  const exNames=new Set(S.clients.map(c=>c.name.toLowerCase().trim()));
  const exCom=new Set(S.clients.map(c=>(c.comitente||'').trim()).filter(Boolean));
  _importRows=[];
  rows.forEach(r=>{
    const name=cols.name?String(r[cols.name]||'').trim():''; if(!name)return;
    const com=cols.com?String(r[cols.com]||'').trim():'';
    let status='ok',msg='';
    if(exNames.has(name.toLowerCase())){status='dup';msg='Nombre duplicado';}
    else if(com&&exCom.has(com)){status='dup';msg='Comitente duplicado';}
    _importRows.push({name,comitente:com,email:cols.email?String(r[cols.email]||'').trim():'',phone:cols.phone?String(r[cols.phone]||'').trim():'',birthday:cols.bday?String(r[cols.bday]||'').trim():'',riesgo:normRiesgo(cols.riesgo?r[cols.riesgo]:''),tag:normTag(cols.tag?r[cols.tag]:''),status,msg});
  });
  const ok=_importRows.filter(r=>r.status==='ok').length;
  const dup=_importRows.filter(r=>r.status==='dup').length;
  const preview=_importRows.slice(0,12).map(r=>`<tr class="row-${r.status}"><td>${r.name}</td><td>${r.comitente||'—'}</td><td>${r.email||'—'}</td><td><span class="pill pill-${r.riesgo}">${r.riesgo}</span></td><td style="font-size:11px">${r.status==='ok'?'✓ OK':r.msg}</td></tr>`).join('');
  document.getElementById('drop-zone').classList.add('ok');
  document.getElementById('import-result').innerHTML=`<div style="display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap">
    <span style="font-size:12px;color:var(--teal);font-weight:600">✓ ${ok} para importar</span>
    ${dup?`<span style="font-size:12px;color:var(--amber);font-weight:600">⚠ ${dup} duplicados</span>`:''}
  </div>
  <div class="ip-preview"><table><thead><tr><th>Nombre</th><th>Comitente</th><th>Email</th><th>Perfil</th><th>Estado</th></tr></thead><tbody>${preview}</tbody></table></div>`;
  const btn=document.getElementById('btn-ci'); if(btn){btn.style.display=ok>0?'inline-flex':'none';btn.textContent=`Importar ${ok} cliente${ok!==1?'s':''}`;}
}

function confirmImport(){
  _importRows.filter(r=>r.status==='ok').forEach(r=>{
    S.clients.push({id:'c'+Date.now()+Math.random().toString(36).slice(2,5),name:r.name,comitente:r.comitente,email:r.email,phone:r.phone,birthday:r.birthday||'',riesgo:r.riesgo,tag:r.tag,color:COLORS[S.clients.length%COLORS.length],nextAction:null,positions:[],operations:[],comments:[],rendMensual:{},alloc:{target:{rv:60,rf:30,crypto:10},notes:''},benchmark:{name:'S&P 500',val:0}});
  });
  save(); closeModal(); updateCounts(); renderDashboard(); toast(`${_importRows.filter(r=>r.status==='ok').length} clientes importados`,'ok');
}

function downloadTemplate(){
  const ws_data=[["Nombre","Comitente Balanz","Email","Teléfono","Fecha Nacimiento (YYYY-MM-DD)","Perfil Riesgo (conservador/moderado/agresivo)","Tag (vip/potencial/revision)"],["Carlos Méndez","123456","carlos@email.com","11-4444-5555","1985-04-10","moderado","vip"],["Ana Rivero","789012","ana@email.com","11-3333-7777","1990-08-22","conservador","potencial"]];
  const wb=XLSX.utils.book_new();const ws=XLSX.utils.aoa_to_sheet(ws_data);ws['!cols']=[{wch:25},{wch:18},{wch:30},{wch:18},{wch:32},{wch:42},{wch:30}];XLSX.utils.book_append_sheet(wb,ws,"Clientes");XLSX.writeFile(wb,"plantilla_clientes_balanz.xlsx");

function openExport(){
  const data=S.clients.map(c=>({Nombre:c.name,Comitente:c.comitente||'',Email:c.email||'',Teléfono:c.phone||'',Nacimiento:c.birthday||'',Perfil:c.riesgo,Tag:c.tag||'',' Capital actual':calcM(c).totalActual.toFixed(0),' Rendimiento %':calcM(c).rendPct.toFixed(1),Posiciones:(c.positions||[]).length,' Próxima acción':c.nextAction?c.nextAction.date+' — '+c.nextAction.tipo:''}));
  const wb=XLSX.utils.book_new();const ws=XLSX.utils.json_to_sheet(data);ws['!cols']=Object.keys(data[0]||{}).map(()=>({wch:22}));XLSX.utils.book_append_sheet(wb,ws,"Clientes");XLSX.writeFile(wb,`crm_export_${TODAY}.xlsx`);
  toast('Datos exportados');
}
